<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Air Draw Ultra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0a0f;
      --bg-surface: #14141f;
      --glass: rgba(20, 20, 30, 0.85);
      --border: rgba(255, 255, 255, 0.15);
      --accent: #00f0ff;
      --text: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background-color: var(--bg-deep);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      position: fixed; /* Prevent pull-to-refresh */
    }

    /* --- Loading --- */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-deep);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease;
    }
    .loader-bar { height: 4px; width: 200px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 20px; overflow: hidden; }
    .loader-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.3s; box-shadow: 0 0 10px var(--accent); }

    /* --- App Layout --- */
    #app { position: relative; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s; display: flex; flex-direction: column; }
    #app.visible { opacity: 1; }
    
    #canvas-container { position: relative; flex-grow: 1; background: #000; overflow: hidden; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    
    /* NO MORE BLACK EFFECTS - Clear Visibility */
    #video-canvas { 
      opacity: 0.8; 
      filter: brightness(1.1) contrast(1.1); 
    }
    #webcam { display: none; }

    /* --- HUD --- */
    #hud { position: absolute; top: 16px; left: 16px; z-index: 50; }
    .badge { 
        background: var(--glass); border: 1px solid var(--border); padding: 8px 16px; 
        border-radius: 12px; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(8px);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
    .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .label { font-size: 10px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }

    /* --- Responsive Toolbar --- */
    #toolbar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
      padding: 10px; border-radius: 24px; display: flex; flex-wrap: wrap; 
      justify-content: center; gap: 8px; z-index: 100; width: 90%; max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .color-grid { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .color-dot { 
        width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; 
        cursor: pointer; transition: 0.2s; 
    }
    .color-dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 12px currentColor; }
    
    .action-group { display: flex; gap: 8px; margin-left: 4px; border-left: 1px solid var(--border); padding-left: 12px; }
    .icon-btn { 
      background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; 
      border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }

    /* --- Settings Modal --- */
    #settings-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: 0.3s; padding: 20px;
    }
    #settings-modal.open { opacity: 1; pointer-events: auto; }
    .settings-box {
      background: var(--bg-surface); border: 1px solid var(--border);
      padding: 24px; border-radius: 28px; width: 100%; max-width: 340px;
    }
    .setting-row { margin-bottom: 20px; }
    .setting-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 12px; opacity: 0.7; }
    input[type=range] { width: 100%; height: 6px; accent-color: var(--accent); }

    /* --- Onboarding --- */
    #onboarding { position: fixed; inset: 0; z-index: 500; background: var(--bg-deep); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .onboarding-box { text-align: center; width: 100%; max-width: 360px; }
    .guide-item { 
        display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); 
        padding: 12px; border-radius: 16px; margin-bottom: 10px; text-align: left; font-size: 14px;
    }

    .btn-main { width: 100%; padding: 14px; border-radius: 16px; border: none; background: white; color: black; font-weight: 700; cursor: pointer; margin-top: 10px; }

    @media (max-width: 480px) {
        #toolbar { border-radius: 20px; bottom: 15px; }
        .color-dot { width: 28px; height: 28px; }
        .action-group { padding-left: 8px; }
        .icon-btn { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <h2 style="font-family: 'Outfit'; letter-spacing: 2px;">AIR DRAW</h2>
    <p id="status-text" style="opacity: 0.5; font-size: 12px; margin-top: 10px;">Initializing AI Vision...</p>
    <div class="loader-bar"><div id="loader-fill" class="loader-fill"></div></div>
  </div>

  <div id="onboarding">
    <div class="onboarding-box">
      <h2 style="font-family: 'Outfit'; font-size: 32px; margin-bottom: 24px;">Air Draw Ultra</h2>
      <div class="guide-item"><span>☝️</span> <strong>Index Finger:</strong> Draw Neon Lines</div>
      <div class="guide-item"><span>✋</span> <strong>Open Palm:</strong> Erase Elements</div>
      <div class="guide-item"><span>✊</span> <strong>Closed Fist:</strong> Pause Drawing</div>
      <button id="start-btn" class="btn-main">START CREATING</button>
    </div>
  </div>

  <div id="settings-modal">
    <div class="settings-box">
      <h3 style="margin-bottom: 20px; font-family: 'Outfit';">Canvas Settings</h3>
      <div class="setting-row">
        <div class="setting-label"><span>Thickness</span> <span id="val-thickness">6px</span></div>
        <input type="range" id="input-thickness" min="2" max="30" value="6">
      </div>
      <div class="setting-row">
        <div class="setting-label"><span>Neon Intensity</span> <span id="val-glow">25px</span></div>
        <input type="range" id="input-glow" min="0" max="80" value="25">
      </div>
      <button id="close-settings" class="btn-main" style="background: rgba(255,255,255,0.1); color: white;">Close</button>
    </div>
  </div>

  <div id="app">
    <div id="hud">
      <div class="badge">
        <div id="status-dot" class="dot"></div>
        <span id="status-label" class="label">Ready</span>
      </div>
    </div>

    <div id="canvas-container">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="video-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>

    <div id="toolbar">
      <div class="color-grid">
        <div class="color-dot active" style="background: #00f0ff" data-color="#00f0ff"></div>
        <div class="color-dot" style="background: #000000" data-color="#ff00e5"></div>
        <div class="color-dot" style="background: #39ff14" data-color="#39ff14"></div>
        <div class="color-dot" style="background: #ffd700" data-color="#ffd700"></div>
        <div class="color-dot" style="background: #ff2d6b" data-color="#ff2d6b"></div>
        <div class="color-dot" style="background: #b400ff" data-color="#b400ff"></div>
        <div class="color-dot" style="background: #ffffff" data-color="#ffffff"></div>
      </div>
      
      <div class="action-group">
        <button class="icon-btn" id="open-settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.39-1.06-.73-1.69-.98l-.37-2.65A.488.488 0 0 0 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1s.03.66.07 1l-2.11 1.63c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.39 1.06.73 1.69.98l.37 2.65c.04.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.63Z"/></svg>
        </button>
        <button class="icon-btn" id="clear-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4ZM6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12Z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm/vision_bundle.js"></script>

  <script type="module">
    const { HandLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs");

    const state = {
      landmarker: null,
      color: '#00f0ff',
      thickness: 6,
      glow: 25,
      isDrawing: false,
      strokes: [],
      currentStroke: null
    };

    const video = document.getElementById('webcam');
    const vCanvas = document.getElementById('video-canvas');
    const dCanvas = document.getElementById('draw-canvas');
    const vCtx = vCanvas.getContext('2d');
    const dCtx = dCanvas.getContext('2d');

    async function init() {
      const fill = document.getElementById('loader-fill');
      const status = document.getElementById('status-text');

      try {
        fill.style.width = "30%";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        
        fill.style.width = "60%";
        state.landmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1
        });

        fill.style.width = "90%";
        const stream = await navigator.mediaDevices.getUserMedia({ 
            video: { 
                facingMode: 'user', 
                width: { ideal: 1280 }, 
                height: { ideal: 720 } 
            } 
        });
        video.srcObject = stream;

        video.onloadeddata = () => {
          fill.style.width = "100%";
          window.dispatchEvent(new Event('resize'));
          setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 600);
            document.getElementById('app').classList.add('visible');
          }, 500);
          loop();
        };

      } catch (e) {
        status.textContent = "Camera Error. Check permissions.";
        status.style.color = "#ff4d4d";
      }
    }

    function loop() {
      if (video.readyState >= 2) {
        const results = state.landmarker.detectForVideo(video, performance.now());
        
        vCtx.clearRect(0, 0, vCanvas.width, vCanvas.height);
        vCtx.save();
        vCtx.scale(-1, 1);
        vCtx.translate(-vCanvas.width, 0);
        vCtx.drawImage(video, 0, 0, vCanvas.width, vCanvas.height);
        vCtx.restore();

        if (results.landmarks && results.landmarks[0]) {
          const hand = results.landmarks[0];
          const gesture = analyze(hand);
          const pos = {
            x: (1 - hand[8].x) * dCanvas.width,
            y: hand[8].y * dCanvas.height
          };

          handle(gesture, pos);
          cursor(pos, gesture);
        } else {
          state.isDrawing = false;
          updateHUD('IDLE');
        }
        
        draw();
      }
      requestAnimationFrame(loop);
    }

    function analyze(lm) {
      const iUp = lm[8].y < lm[6].y;
      const mUp = lm[12].y < lm[10].y;
      const rUp = lm[16].y < lm[14].y;
      if (iUp && !mUp) return 'DRAWING';
      if (iUp && mUp && rUp) return 'ERASING';
      return 'IDLE';
    }

    function handle(g, pos) {
      updateHUD(g);
      if (g === 'DRAWING') {
        if (!state.isDrawing) {
          state.currentStroke = { color: state.color, thickness: state.thickness, glow: state.glow, points: [] };
          state.strokes.push(state.currentStroke);
          state.isDrawing = true;
        }
        state.currentStroke.points.push(pos);
      } else if (g === 'ERASING') {
        state.isDrawing = false;
        const rad = 60;
        state.strokes = state.strokes.filter(s => !s.points.some(p => Math.hypot(p.x-pos.x, p.y-pos.y) < rad));
      } else {
        state.isDrawing = false;
      }
    }

    function draw() {
      dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
      dCtx.lineCap = 'round';
      dCtx.lineJoin = 'round';
      state.strokes.forEach(s => {
        if (s.points.length < 2) return;
        dCtx.beginPath();
        dCtx.strokeStyle = s.color;
        dCtx.lineWidth = s.thickness;
        dCtx.shadowBlur = s.glow;
        dCtx.shadowColor = s.color;
        dCtx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 1; i < s.points.length; i++) dCtx.lineTo(s.points[i].x, s.points[i].y);
        dCtx.stroke();
      });
    }

    function cursor(pos, g) {
      vCtx.beginPath();
      vCtx.arc(pos.x, pos.y, g === 'ERASING' ? 40 : 10, 0, Math.PI * 2);
      vCtx.fillStyle = g === 'ERASING' ? 'rgba(255,50,50,0.3)' : state.color;
      if (g !== 'ERASING') { vCtx.shadowBlur = 15; vCtx.shadowColor = state.color; }
      vCtx.fill();
    }

    function updateHUD(g) {
      const dot = document.getElementById('status-dot');
      const label = document.getElementById('status-label');
      label.textContent = g;
      dot.className = g === 'IDLE' ? 'dot' : 'dot active';
      if (g === 'DRAWING') dot.style.background = state.color;
      else if (g === 'ERASING') dot.style.background = '#ff4d4d';
      else dot.style.background = '#444';
    }

    window.addEventListener('resize', () => {
      const container = document.getElementById('canvas-container');
      vCanvas.width = dCanvas.width = container.clientWidth;
      vCanvas.height = dCanvas.height = container.clientHeight;
    });

    document.getElementById('start-btn').onclick = () => document.getElementById('onboarding').style.display = 'none';
    document.getElementById('clear-btn').onclick = () => state.strokes = [];
    document.getElementById('open-settings').onclick = () => document.getElementById('settings-modal').classList.add('open');
    document.getElementById('close-settings').onclick = () => document.getElementById('settings-modal').classList.remove('open');
    
    document.getElementById('input-thickness').oninput = (e) => {
      state.thickness = parseInt(e.target.value);
      document.getElementById('val-thickness').textContent = state.thickness + 'px';
    };
    document.getElementById('input-glow').oninput = (e) => {
      state.glow = parseInt(e.target.value);
      document.getElementById('val-glow').textContent = state.glow + 'px';
    };

    document.querySelectorAll('.color-dot').forEach(dot => {
      dot.onclick = () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        state.color = dot.dataset.color;
      };
    });

    init();
  </script>
</body>
</html>
