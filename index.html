<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Draw Pro — AI Hand Tracking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #07070d;
      --bg-surface: #0e0e1a;
      --glass: rgba(10, 10, 14, 0.85);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #00f0ff;
      --text: #e8e8f0;
      --text-dim: rgba(232, 232, 240, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* --- Loading --- */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-deep);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    .loader-bar { height: 4px; width: 280px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 25px; overflow: hidden; }
    .loader-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent); }

    /* --- App Layout --- */
    #app { position: relative; width: 100%; height: 100%; opacity: 0; transition: opacity 0.5s; }
    #app.visible { opacity: 1; }
    #canvas-container { position: relative; height: 100%; width: 100%; background: #000; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #video-canvas { opacity: 0.35; filter: grayscale(0.5) brightness(0.6); }
    #webcam { display: none; }

    /* --- Navigation HUD --- */
    #hud { position: absolute; top: 24px; left: 24px; z-index: 100; pointer-events: none; }
    .badge { background: var(--glass); border: 1px solid var(--border); padding: 10px 20px; border-radius: 15px; display: flex; align-items: center; gap: 12px; backdrop-filter: blur(10px); }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; }
    .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .label { font-size: 11px; font-weight: 800; letter-spacing: 1.5px; }

    /* --- Floating Toolbar --- */
    #toolbar {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
      padding: 12px 20px; border-radius: 100px; display: flex; gap: 12px; align-items: center;
      z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .color-dot { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; }
    .color-dot.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px currentColor; }
    .icon-btn { 
      background: rgba(255,255,255,0.08); border: none; color: white; width: 38px; height: 38px; 
      border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.15); }
    .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* --- Settings Modal (Popup Box) --- */
    #settings-modal {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.4); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: 0.3s;
    }
    #settings-modal.open { opacity: 1; pointer-events: auto; }
    .settings-box {
      background: var(--bg-surface); border: 1px solid var(--border);
      padding: 30px; border-radius: 30px; width: 90%; max-width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
    }
    .settings-box h3 { font-family: 'Outfit'; margin-bottom: 24px; font-size: 22px; text-align: center; }
    .setting-row { margin-bottom: 20px; }
    .setting-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 10px; color: var(--text-dim); }
    input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
    .btn-close-settings { 
      margin-top: 15px; width: 100%; padding: 12px; border-radius: 15px; border: none; 
      background: rgba(255,255,255,0.05); color: white; font-weight: 600; cursor: pointer;
    }

    /* --- Instructions Modal --- */
    #onboarding { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; }
    .onboarding-box { text-align: center; max-width: 400px; padding: 40px; }
    .onboarding-box h2 { font-family: 'Outfit'; font-size: 32px; margin-bottom: 20px; }
    .guide-item { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 18px; margin-bottom: 12px; text-align: left; }
    .btn-start { width: 100%; padding: 16px; border-radius: 20px; border: none; background: white; color: black; font-weight: 800; cursor: pointer; font-size: 16px; margin-top: 15px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading-screen">
    <div style="text-align: center">
      <h1 style="font-family: 'Outfit'; letter-spacing: 3px;">AIR DRAW PRO</h1>
      <p id="status-text" style="opacity: 0.5; font-size: 13px; margin-top: 8px;">Syncing AI hand models...</p>
      <div class="loader-bar"><div id="loader-fill" class="loader-fill"></div></div>
    </div>
  </div>

  <!-- Onboarding -->
  <div id="onboarding" class="hidden">
    <div class="onboarding-box">
      <h2>Let's Draw!</h2>
      <div class="guide-item"><span>☝️</span> <strong>Index up:</strong> Start drawing</div>
      <div class="guide-item"><span>✋</span> <strong>Palm open:</strong> Sweep to erase</div>
      <div class="guide-item"><span>✊</span> <strong>Fist closed:</strong> Move freely</div>
      <button id="start-btn" class="btn-start">GO TO CANVAS</button>
    </div>
  </div>

  <!-- Settings Popup -->
  <div id="settings-modal">
    <div class="settings-box">
      <h3>Settings</h3>
      <div class="setting-row">
        <div class="setting-label"><span>Brush Thickness</span> <span id="val-thickness">6px</span></div>
        <input type="range" id="input-thickness" min="1" max="25" value="6">
      </div>
      <div class="setting-row">
        <div class="setting-label"><span>Neon Glow</span> <span id="val-glow">20px</span></div>
        <input type="range" id="input-glow" min="0" max="60" value="20">
      </div>
      <button id="close-settings" class="btn-close-settings">Done</button>
    </div>
  </div>

  <!-- App -->
  <div id="app">
    <div id="hud">
      <div class="badge">
        <div id="status-dot" class="dot"></div>
        <span id="status-label" class="label">READY</span>
      </div>
    </div>

    <div id="canvas-container">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="video-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>

    <div id="toolbar">
      <div class="color-dot active" style="background: #00f0ff" data-color="#00f0ff"></div>
      <div class="color-dot" style="background: #ff00e5" data-color="#ff00e5"></div>
      <div class="color-dot" style="background: #39ff14" data-color="#39ff14"></div>
      <div class="color-dot" style="background: #ffffff" data-color="#ffffff"></div>
      
      <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 4px;"></div>
      
      <button class="icon-btn" id="open-settings" title="Settings">
        <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12A3.5 3.5 0 0 1 12 8.5A3.5 3.5 0 0 1 15.5 12A3.5 3.5 0 0 1 12 15.5M19.43 12.97c.04-.32.07-.65.07-.97c0-.32-.03-.65-.07-.97l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.22-.09-.49 0-.61.22l-2 3.46c-.12.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.97c0 .32.03.65.07.97l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.31.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.22.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65Z"/></svg>
      </button>
      
      <button class="icon-btn" id="clear-btn" title="Clear Canvas">
        <svg viewBox="0 0 24 24"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14M6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12Z"/></svg>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm/vision_bundle.js"></script>

  <script type="module">
    const { HandLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs");

    const state = {
      landmarker: null,
      activeColor: '#00f0ff',
      thickness: 6,
      glow: 20,
      isDrawing: false,
      strokes: [],
      currentStroke: null
    };

    const video = document.getElementById('webcam');
    const vCanvas = document.getElementById('video-canvas');
    const dCanvas = document.getElementById('draw-canvas');
    const vCtx = vCanvas.getContext('2d');
    const dCtx = dCanvas.getContext('2d');

    async function init() {
      const fill = document.getElementById('loader-fill');
      const status = document.getElementById('status-text');

      try {
        fill.style.width = "20%";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        
        fill.style.width = "50%";
        status.textContent = "Loading AI Hand Tracking...";
        state.landmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1
        });

        fill.style.width = "80%";
        status.textContent = "Connecting Camera...";
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
        video.srcObject = stream;

        video.onloadeddata = () => {
          fill.style.width = "100%";
          window.dispatchEvent(new Event('resize'));
          setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            document.getElementById('loading-screen').style.visibility = 'hidden';
            document.getElementById('onboarding').classList.remove('hidden');
            document.getElementById('app').classList.add('visible');
          }, 500);
          loop();
        };

      } catch (e) {
        status.textContent = "Camera access denied.";
        status.style.color = "#ff4d4d";
      }
    }

    function loop() {
      if (video.readyState >= 2) {
        const results = state.landmarker.detectForVideo(video, performance.now());
        
        vCtx.clearRect(0, 0, vCanvas.width, vCanvas.height);
        vCtx.save();
        vCtx.scale(-1, 1);
        vCtx.translate(-vCanvas.width, 0);
        vCtx.drawImage(video, 0, 0, vCanvas.width, vCanvas.height);
        vCtx.restore();

        if (results.landmarks && results.landmarks[0]) {
          const hand = results.landmarks[0];
          const gesture = analyzeHand(hand);
          const pos = {
            x: (1 - hand[8].x) * dCanvas.width,
            y: hand[8].y * dCanvas.height
          };

          handleInput(gesture, pos);
          drawCursor(pos, gesture);
        } else {
          state.isDrawing = false;
          updateHUD('IDLE');
        }
        
        renderStrokes();
      }
      requestAnimationFrame(loop);
    }

    function analyzeHand(lm) {
      const indexUp = lm[8].y < lm[6].y;
      const middleUp = lm[12].y < lm[10].y;
      const ringUp = lm[16].y < lm[14].y;

      if (indexUp && !middleUp) return 'DRAWING';
      if (indexUp && middleUp && ringUp) return 'ERASING';
      return 'IDLE';
    }

    function handleInput(gesture, pos) {
      updateHUD(gesture);

      if (gesture === 'DRAWING') {
        if (!state.isDrawing) {
          state.currentStroke = { 
            color: state.activeColor, 
            thickness: state.thickness, 
            glow: state.glow,
            points: [] 
          };
          state.strokes.push(state.currentStroke);
          state.isDrawing = true;
        }
        state.currentStroke.points.push(pos);
      } else if (gesture === 'ERASING') {
        state.isDrawing = false;
        performErase(pos);
      } else {
        state.isDrawing = false;
      }
    }

    function renderStrokes() {
      dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
      dCtx.lineCap = 'round';
      dCtx.lineJoin = 'round';

      state.strokes.forEach(s => {
        if (s.points.length < 2) return;
        dCtx.beginPath();
        dCtx.strokeStyle = s.color;
        dCtx.lineWidth = s.thickness;
        dCtx.shadowBlur = s.glow;
        dCtx.shadowColor = s.color;
        
        dCtx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 1; i < s.points.length; i++) {
          dCtx.lineTo(s.points[i].x, s.points[i].y);
        }
        dCtx.stroke();
      });
    }

    function performErase(pos) {
      const radius = 50;
      state.strokes = state.strokes.filter(stroke => {
        return !stroke.points.some(p => {
          const dx = p.x - pos.x;
          const dy = p.y - pos.y;
          return Math.sqrt(dx*dx + dy*dy) < radius;
        });
      });
    }

    function drawCursor(pos, gesture) {
      vCtx.beginPath();
      vCtx.arc(pos.x, pos.y, gesture === 'ERASING' ? 40 : 10, 0, Math.PI * 2);
      vCtx.fillStyle = gesture === 'ERASING' ? 'rgba(255,50,50,0.3)' : state.activeColor;
      if (gesture !== 'ERASING') {
        vCtx.shadowBlur = 15;
        vCtx.shadowColor = state.activeColor;
      }
      vCtx.fill();
    }

    function updateHUD(gesture) {
      const dot = document.getElementById('status-dot');
      const label = document.getElementById('status-label');
      label.textContent = gesture;
      
      if (gesture === 'DRAWING') {
        dot.className = 'dot active';
        dot.style.background = state.activeColor;
      } else if (gesture === 'ERASING') {
        dot.className = 'dot active';
        dot.style.background = '#ff4d4d';
      } else {
        dot.className = 'dot';
        dot.style.background = '#444';
      }
    }

    window.addEventListener('resize', () => {
      const container = document.getElementById('canvas-container');
      vCanvas.width = dCanvas.width = container.clientWidth;
      vCanvas.height = dCanvas.height = container.clientHeight;
    });

    // Event Handlers
    document.getElementById('start-btn').onclick = () => document.getElementById('onboarding').classList.add('hidden');
    document.getElementById('clear-btn').onclick = () => state.strokes = [];
    
    // Settings Modal Handlers
    const settingsModal = document.getElementById('settings-modal');
    document.getElementById('open-settings').onclick = () => settingsModal.classList.add('open');
    document.getElementById('close-settings').onclick = () => settingsModal.classList.remove('open');
    settingsModal.onclick = (e) => { if (e.target === settingsModal) settingsModal.classList.remove('open'); };

    // Range Inputs
    const thickIn = document.getElementById('input-thickness');
    const thickVal = document.getElementById('val-thickness');
    thickIn.oninput = () => {
      state.thickness = parseInt(thickIn.value);
      thickVal.textContent = state.thickness + 'px';
    };

    const glowIn = document.getElementById('input-glow');
    const glowVal = document.getElementById('val-glow');
    glowIn.oninput = () => {
      state.glow = parseInt(glowIn.value);
      glowVal.textContent = state.glow + 'px';
    };

    document.querySelectorAll('.color-dot').forEach(dot => {
      dot.onclick = () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        state.activeColor = dot.dataset.color;
      };
    });

    init();
  </script>
</body>
</html>
