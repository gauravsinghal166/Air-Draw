<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Draw — Gesture-Based Doodler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet" />
  <style>
    /* --- CSS Design System --- */
    :root {
      --bg-deep: #07070d;
      --bg-surface: #0e0e1a;
      --glass-bg: rgba(10, 10, 14, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --accent-cyan: #00f0ff;
      --accent-magenta: #ff00e5;
      --text-primary: #e8e8f0;
      --text-secondary: rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* --- Loading Screen --- */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.6s ease;
    }
    .loader-content { text-align: center; width: 280px; }
    .loader-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 20px; overflow: hidden; }
    .loader-bar-fill { height: 100%; width: 30%; background: var(--accent-cyan); transition: width 0.3s; box-shadow: 0 0 15px var(--accent-cyan); }
    .hidden { display: none !important; }
    .fade-out { opacity: 0; pointer-events: none; }

    /* --- Layout --- */
    #app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
    #canvas-container { position: relative; flex-grow: 1; background: #000; overflow: hidden; cursor: crosshair; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #video-canvas { opacity: 0.35; filter: grayscale(0.5) brightness(0.6); }
    #webcam { display: none; }

    /* --- Toolbar --- */
    #toolbar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      padding: 12px 24px;
      border-radius: 100px;
      display: flex;
      gap: 16px;
      align-items: center;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform 0.2s; }
    .color-btn.active { border-color: white; transform: scale(1.2); }
    .clear-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: 600; }
    .clear-btn:hover { background: rgba(255,255,255,0.2); }

    /* --- HUD --- */
    #hud {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 50;
    }
    .gesture-badge {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      padding: 8px 16px;
      border-radius: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .status-active { background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }

    /* --- Onboarding --- */
    #onboarding-modal {
      position: fixed;
      inset: 0;
      z-index: 2000;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background: var(--bg-surface);
      padding: 40px;
      border-radius: 32px;
      max-width: 500px;
      text-align: center;
      border: 1px solid var(--glass-border);
    }
    .modal-content h2 { font-family: 'Outfit', sans-serif; font-size: 32px; margin-bottom: 24px; }
    .gesture-list { text-align: left; margin-bottom: 30px; }
    .gesture-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; }
    .gesture-icon { font-size: 24px; }
    .start-btn { 
      background: white; color: black; border: none; padding: 14px 40px; 
      border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 16px;
      transition: transform 0.2s;
    }
    .start-btn:hover { transform: translateY(-2px); background: var(--accent-cyan); }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader-content">
      <h1 style="font-family: 'Outfit'; margin-bottom: 8px;">AIR DRAW</h1>
      <p id="loader-status" class="loader-subtitle">Loading Hand AI...</p>
      <div class="loader-bar">
        <div id="loader-fill" class="loader-bar-fill"></div>
      </div>
    </div>
  </div>

  <div id="onboarding-modal" class="hidden">
    <div class="modal-content">
      <h2>Air Draw</h2>
      <div class="gesture-list">
        <div class="gesture-row">
          <span class="gesture-icon">☝️</span>
          <div><strong>Index Finger:</strong> Point to draw in the air</div>
        </div>
        <div class="gesture-row">
          <span class="gesture-icon">✋</span>
          <div><strong>Open Palm:</strong> Hover to erase strokes</div>
        </div>
        <div class="gesture-row">
          <span class="gesture-icon">✊</span>
          <div><strong>Closed Fist:</strong> Pause / Move without drawing</div>
        </div>
      </div>
      <button id="btn-start" class="start-btn">START DRAWING</button>
    </div>
  </div>

  <div id="app" class="hidden">
    <div id="hud">
      <div class="gesture-badge">
        <div id="status-dot" class="status-dot"></div>
        <span id="gesture-name">IDLE</span>
      </div>
    </div>

    <div id="canvas-container">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="video-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>

    <div id="toolbar">
      <div class="color-btn active" style="background: #00f0ff" data-color="#00f0ff"></div>
      <div class="color-btn" style="background: #ff00e5" data-color="#ff00e5"></div>
      <div class="color-btn" style="background: #39ff14" data-color="#39ff14"></div>
      <div class="color-btn" style="background: #ffffff" data-color="#ffffff"></div>
      <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.2); margin: 0 8px;"></div>
      <button id="btn-clear" class="clear-btn">CLEAR</button>
    </div>
  </div>

  <!-- MediaPipe Tasks Vision Library -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm/vision_bundle.js"></script>

  <script type="module">
    const { HandLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs");

    const state = {
      handLandmarker: null,
      webcam: null,
      activeColor: '#00f0ff',
      strokes: [], // { points: [{x,y}], color }
      currentStroke: null,
      isDrawing: false,
      currentGesture: 'IDLE',
      lastPos: null
    };

    const video = document.getElementById('webcam');
    const videoCanvas = document.getElementById('video-canvas');
    const drawCanvas = document.getElementById('draw-canvas');
    const vCtx = videoCanvas.getContext('2d');
    const dCtx = drawCanvas.getContext('2d');
    const loaderFill = document.getElementById('loader-fill');
    const loaderStatus = document.getElementById('loader-status');

    async function init() {
      try {
        // 1. Initialize Hand Landmarker
        loaderStatus.textContent = "Loading Vision AI Models...";
        loaderFill.style.width = "40%";
        
        const vision = await FilesetResolver.forVisionTasks(
          "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
        );
        
        state.handLandmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1
        });

        loaderFill.style.width = "70%";
        loaderStatus.textContent = "Accessing Camera...";

        // 2. Initialize Webcam
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { width: 1280, height: 720 } 
        });
        video.srcObject = stream;
        
        video.onloadeddata = () => {
          resize();
          loaderFill.style.width = "100%";
          setTimeout(() => {
            document.getElementById('loading-screen').classList.add('fade-out');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('onboarding-modal').classList.remove('hidden');
          }, 500);
          render();
        };

      } catch (err) {
        console.error(err);
        loaderStatus.textContent = "Error: Camera access denied or Model failed to load.";
        loaderStatus.style.color = "#ff4d4d";
      }
    }

    function resize() {
      const container = document.getElementById('canvas-container');
      const w = container.clientWidth;
      const h = container.clientHeight;
      
      videoCanvas.width = w;
      videoCanvas.height = h;
      drawCanvas.width = w;
      drawCanvas.height = h;
    }

    function detectGesture(landmarks) {
      // Index tip: 8, PIP: 6
      // Middle tip: 12, PIP: 10
      // Thumb tip: 4
      const indexTip = landmarks[8];
      const indexPip = landmarks[6];
      const middleTip = landmarks[12];
      const middlePip = landmarks[10];
      const ringTip = landmarks[16];
      const thumbTip = landmarks[4];
      const wrist = landmarks[0];

      const isIndexExtended = indexTip.y < indexPip.y;
      const isMiddleExtended = middleTip.y < middlePip.y;
      const isRingExtended = ringTip.y < landmarks[14].y;

      // Draw: Just index up
      if (isIndexExtended && !isMiddleExtended) return 'DRAW';
      
      // Erase: Palm open (all fingers up)
      if (isIndexExtended && isMiddleExtended && isRingExtended) return 'ERASE';
      
      return 'IDLE';
    }

    function render() {
      if (video.readyState === 4) {
        const results = state.handLandmarker.detectForVideo(video, performance.now());
        
        // Clear video canvas and draw mirrored frame
        vCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);
        vCtx.save();
        vCtx.scale(-1, 1);
        vCtx.translate(-videoCanvas.width, 0);
        vCtx.drawImage(video, 0, 0, videoCanvas.width, videoCanvas.height);
        vCtx.restore();

        if (results.landmarks && results.landmarks.length > 0) {
          const landmarks = results.landmarks[0];
          const gesture = detectGesture(landmarks);
          state.currentGesture = gesture;

          // Map point to mirrored canvas
          const indexPoint = {
            x: (1 - landmarks[8].x) * drawCanvas.width,
            y: landmarks[8].y * drawCanvas.height
          };

          updateHUD(gesture);

          if (gesture === 'DRAW') {
            if (!state.isDrawing) {
              state.currentStroke = { color: state.activeColor, points: [] };
              state.strokes.push(state.currentStroke);
              state.isDrawing = true;
            }
            state.currentStroke.points.push(indexPoint);
          } else if (gesture === 'ERASE') {
            state.isDrawing = false;
            eraseAt(indexPoint);
          } else {
            state.isDrawing = false;
          }
          
          // Draw Cursor
          vCtx.beginPath();
          vCtx.arc(indexPoint.x, indexPoint.y, gesture === 'ERASE' ? 30 : 10, 0, Math.PI * 2);
          vCtx.fillStyle = gesture === 'ERASE' ? 'rgba(255,0,0,0.3)' : state.activeColor;
          vCtx.fill();
        } else {
          state.isDrawing = false;
          updateHUD('IDLE');
        }

        drawStrokes();
      }
      requestAnimationFrame(render);
    }

    function drawStrokes() {
      dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
      dCtx.lineJoin = 'round';
      dCtx.lineCap = 'round';

      state.strokes.forEach(stroke => {
        if (stroke.points.length < 2) return;
        dCtx.beginPath();
        dCtx.strokeStyle = stroke.color;
        dCtx.lineWidth = 6;
        dCtx.shadowBlur = 15;
        dCtx.shadowColor = stroke.color;
        
        dCtx.moveTo(stroke.points[0].x, stroke.points[0].y);
        for (let i = 1; i < stroke.points.length; i++) {
          dCtx.lineTo(stroke.points[i].x, stroke.points[i].y);
        }
        dCtx.stroke();
      });
    }

    function eraseAt(point) {
      const radius = 40;
      state.strokes = state.strokes.filter(stroke => {
        // Simple logic: if any point in stroke is near eraser, remove stroke
        const isNear = stroke.points.some(p => {
          const dx = p.x - point.x;
          const dy = p.y - point.y;
          return Math.sqrt(dx*dx + dy*dy) < radius;
        });
        return !isNear;
      });
    }

    function updateHUD(gesture) {
      const dot = document.getElementById('status-dot');
      const name = document.getElementById('gesture-name');
      name.textContent = gesture;
      
      if (gesture === 'DRAW') {
        dot.style.background = state.activeColor;
        dot.classList.add('status-active');
      } else if (gesture === 'ERASE') {
        dot.style.background = '#ff4d4d';
        dot.classList.add('status-active');
      } else {
        dot.style.background = '#ccc';
        dot.classList.remove('status-active');
      }
    }

    // --- Listeners ---
    window.addEventListener('resize', resize);
    
    document.getElementById('btn-start').addEventListener('click', () => {
      document.getElementById('onboarding-modal').classList.add('hidden');
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      state.strokes = [];
    });

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.activeColor = btn.dataset.color;
      });
    });

    init();
  </script>
</body>
</html>
