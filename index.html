<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Air Draw — AI Gesture Doodler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #07070d;
      --bg-surface: #0e0e1a;
      --glass: rgba(10, 10, 14, 0.8);
      --border: rgba(255, 255, 255, 0.1);
      --accent: #00f0ff;
      --text: #e8e8f0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* --- Loading Screen --- */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg-deep);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s ease, visibility 0.6s;
    }
    .loader-content { text-align: center; width: 300px; }
    .loader-logo { margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--accent)); }
    .loader-bar { height: 4px; background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 20px; overflow: hidden; position: relative; }
    .loader-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.4s ease; box-shadow: 0 0 15px var(--accent); }
    
    /* --- Main UI --- */
    #app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.5s; }
    #app.visible { opacity: 1; }
    #canvas-container { position: relative; flex-grow: 1; background: #000; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #video-canvas { opacity: 0.4; filter: brightness(0.7) contrast(1.2); }
    #webcam { display: none; }

    /* --- Toolbar --- */
    #toolbar {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
      padding: 12px 24px; border-radius: 100px; display: flex; gap: 15px; align-items: center;
      z-index: 100; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .color-dot { width: 34px; height: 34px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: 0.2s; position: relative; }
    .color-dot.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 15px currentColor; }
    .btn-action { background: rgba(255,255,255,0.08); border: none; color: white; padding: 10px 20px; border-radius: 50px; cursor: pointer; font-weight: 600; font-size: 14px; }
    .btn-action:hover { background: rgba(255,255,255,0.15); }

    /* --- HUD --- */
    #hud { position: absolute; top: 30px; left: 30px; z-index: 100; pointer-events: none; }
    .badge { background: var(--glass); border: 1px solid var(--border); padding: 10px 20px; border-radius: 15px; display: flex; align-items: center; gap: 12px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #444; transition: 0.3s; }
    .dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .label { font-size: 12px; font-weight: 800; letter-spacing: 1.5px; color: var(--text); }

    /* --- Modal --- */
    #modal { position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: center; }
    .modal-box { background: var(--bg-surface); padding: 40px; border-radius: 40px; border: 1px solid var(--border); text-align: center; max-width: 450px; }
    .modal-box h2 { font-family: 'Outfit'; font-size: 36px; margin-bottom: 20px; }
    .guide { text-align: left; margin: 25px 0; display: grid; gap: 15px; }
    .guide-item { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 15px; }
    .guide-icon { font-size: 24px; }
    .btn-start { width: 100%; padding: 16px; border-radius: 20px; border: none; background: white; color: black; font-weight: 800; cursor: pointer; font-size: 16px; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader-content">
      <svg class="loader-logo" width="80" height="80" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#00f0ff" />
            <stop offset="100%" style="stop-color:#ff00e5" />
          </linearGradient>
        </defs>
        <path d="M20,50 Q20,20 50,20 Q80,20 80,50 Q80,80 50,80 Q20,80 20,50" fill="none" stroke="url(#g)" stroke-width="8" />
        <circle cx="50" cy="50" r="10" fill="url(#g)" />
      </svg>
      <h1 style="font-family: 'Outfit'; letter-spacing: 2px;">AIR DRAW</h1>
      <p id="status-text" style="opacity: 0.6; font-size: 14px; margin-top: 10px;">Warming up AI engine...</p>
      <div class="loader-bar"><div id="loader-fill" class="loader-fill"></div></div>
    </div>
  </div>

  <div id="modal" class="hidden">
    <div class="modal-box">
      <h2>Ready to Create?</h2>
      <div class="guide">
        <div class="guide-item"><span class="guide-icon">☝️</span> <span><strong>One Finger:</strong> Draw in the air</span></div>
        <div class="guide-item"><span class="guide-icon">✋</span> <span><strong>Full Palm:</strong> Sweep to erase</span></div>
        <div class="guide-item"><span class="guide-icon">✊</span> <span><strong>Fist:</strong> Move without drawing</span></div>
      </div>
      <button id="start-button" class="btn-start">LET'S GO</button>
    </div>
  </div>

  <div id="app">
    <div id="hud">
      <div class="badge">
        <div id="status-dot" class="dot"></div>
        <span id="status-label" class="label">CONNECTING...</span>
      </div>
    </div>

    <div id="canvas-container">
      <video id="webcam" autoplay playsinline></video>
      <canvas id="video-canvas"></canvas>
      <canvas id="draw-canvas"></canvas>
    </div>

    <div id="toolbar">
      <div class="color-dot active" style="background: #00f0ff; color: #00f0ff" data-color="#00f0ff"></div>
      <div class="color-dot" style="background: #ff00e5; color: #ff00e5" data-color="#ff00e5"></div>
      <div class="color-dot" style="background: #39ff14; color: #39ff14" data-color="#39ff14"></div>
      <div class="color-dot" style="background: #ffffff; color: #ffffff" data-color="#ffffff"></div>
      <div style="width: 1px; height: 24px; background: rgba(255,255,255,0.1); margin: 0 10px;"></div>
      <button id="clear-btn" class="btn-action">CLEAR ALL</button>
    </div>
  </div>

  <!-- MediaPipe Tasks Vision -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm/vision_bundle.js"></script>

  <script type="module">
    const { HandLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs");

    const state = {
      landmarker: null,
      activeColor: '#00f0ff',
      isDrawing: false,
      strokes: [],
      currentStroke: null,
      lastGesture: 'IDLE'
    };

    const video = document.getElementById('webcam');
    const vCanvas = document.getElementById('video-canvas');
    const dCanvas = document.getElementById('draw-canvas');
    const vCtx = vCanvas.getContext('2d');
    const dCtx = dCanvas.getContext('2d');

    async function setup() {
      const fill = document.getElementById('loader-fill');
      const status = document.getElementById('status-text');

      try {
        fill.style.width = "20%";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        
        fill.style.width = "50%";
        status.textContent = "Downloading AI Hand Models...";
        state.landmarker = await HandLandmarker.createFromOptions(vision, {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 1
        });

        fill.style.width = "80%";
        status.textContent = "Requesting Camera Access...";
        const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
        video.srcObject = stream;

        video.onloadeddata = () => {
          fill.style.width = "100%";
          window.dispatchEvent(new Event('resize'));
          setTimeout(() => {
            document.getElementById('loading-screen').style.opacity = '0';
            document.getElementById('loading-screen').style.visibility = 'hidden';
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('app').classList.add('visible');
          }, 500);
          loop();
        };

      } catch (e) {
        status.textContent = "Error: Camera access or AI model failed.";
        status.style.color = "#ff4d4d";
        console.error(e);
      }
    }

    function loop() {
      if (video.readyState >= 2) {
        const results = state.landmarker.detectForVideo(video, performance.now());
        
        vCtx.clearRect(0, 0, vCanvas.width, vCanvas.height);
        vCtx.save();
        vCtx.scale(-1, 1);
        vCtx.translate(-vCanvas.width, 0);
        vCtx.drawImage(video, 0, 0, vCanvas.width, vCanvas.height);
        vCtx.restore();

        if (results.landmarks && results.landmarks[0]) {
          const hand = results.landmarks[0];
          const gesture = analyzeHand(hand);
          const pos = {
            x: (1 - hand[8].x) * dCanvas.width,
            y: hand[8].y * dCanvas.height
          };

          handleInput(gesture, pos);
          drawCursor(pos, gesture);
        } else {
          state.isDrawing = false;
          updateHUD('IDLE');
        }
        
        renderStrokes();
      }
      requestAnimationFrame(loop);
    }

    function analyzeHand(lm) {
      // Index tip: 8, pip: 6
      // Middle tip: 12, pip: 10
      const indexUp = lm[8].y < lm[6].y;
      const middleUp = lm[12].y < lm[10].y;
      const ringUp = lm[16].y < lm[14].y;

      if (indexUp && !middleUp) return 'DRAW';
      if (indexUp && middleUp && ringUp) return 'ERASE';
      return 'IDLE';
    }

    function handleInput(gesture, pos) {
      updateHUD(gesture);

      if (gesture === 'DRAW') {
        if (!state.isDrawing) {
          state.currentStroke = { color: state.activeColor, points: [] };
          state.strokes.push(state.currentStroke);
          state.isDrawing = true;
        }
        state.currentStroke.points.push(pos);
      } else if (gesture === 'ERASE') {
        state.isDrawing = false;
        performErase(pos);
      } else {
        state.isDrawing = false;
      }
    }

    function renderStrokes() {
      dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
      dCtx.lineCap = 'round';
      dCtx.lineJoin = 'round';

      state.strokes.forEach(s => {
        if (s.points.length < 2) return;
        dCtx.beginPath();
        dCtx.strokeStyle = s.color;
        dCtx.lineWidth = 6;
        dCtx.shadowBlur = 15;
        dCtx.shadowColor = s.color;
        
        dCtx.moveTo(s.points[0].x, s.points[0].y);
        for (let i = 1; i < s.points.length; i++) {
          dCtx.lineTo(s.points[i].x, s.points[i].y);
        }
        dCtx.stroke();
      });
    }

    function performErase(pos) {
      const radius = 50;
      state.strokes = state.strokes.filter(stroke => {
        return !stroke.points.some(p => {
          const dx = p.x - pos.x;
          const dy = p.y - pos.y;
          return Math.sqrt(dx*dx + dy*dy) < radius;
        });
      });
    }

    function drawCursor(pos, gesture) {
      vCtx.beginPath();
      vCtx.arc(pos.x, pos.y, gesture === 'ERASE' ? 40 : 12, 0, Math.PI * 2);
      vCtx.fillStyle = gesture === 'ERASE' ? 'rgba(255,0,0,0.3)' : state.activeColor;
      if (gesture !== 'ERASE') {
        vCtx.shadowBlur = 10;
        vCtx.shadowColor = state.activeColor;
      }
      vCtx.fill();
    }

    function updateHUD(gesture) {
      const dot = document.getElementById('status-dot');
      const label = document.getElementById('status-label');
      label.textContent = gesture;
      dot.className = 'dot active';
      
      if (gesture === 'DRAW') dot.style.background = state.activeColor;
      else if (gesture === 'ERASE') dot.style.background = '#ff4d4d';
      else {
        dot.style.background = '#444';
        dot.className = 'dot';
      }
    }

    window.addEventListener('resize', () => {
      const container = document.getElementById('canvas-container');
      vCanvas.width = dCanvas.width = container.clientWidth;
      vCanvas.height = dCanvas.height = container.clientHeight;
    });

    document.getElementById('start-button').onclick = () => {
      document.getElementById('modal').classList.add('hidden');
    };

    document.getElementById('clear-btn').onclick = () => {
      state.strokes = [];
    };

    document.querySelectorAll('.color-dot').forEach(dot => {
      dot.onclick = () => {
        document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
        state.activeColor = dot.dataset.color;
      };
    });

    setup();
  </script>
</body>
</html>
